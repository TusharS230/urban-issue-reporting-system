<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Urban Issue</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="layout">
      <!-- Sidebar (same style as dashboards) -->

      <aside class="sidebar">
        <h2>Urban Issue</h2>

        <ul>
          <li onclick="goLogin()">Login</li>
          <li onclick="goRegister()">Register</li>
        </ul>
      </aside>

      <!-- Main Content -->

      <main class="content">
        <header class="topbar">
          <h2>Welcome</h2>
        </header>

        <section style="text-align: center; margin-top: 100px">
          <h1
            style="
              font-size: 42px;
              font-weight: 800;
              color: #1e3c72;
              margin-bottom: 16px;
              letter-spacing: -0.5px;
            "
          >
            Urban Issue Reporting System
          </h1>

          <p
            style="
              margin-top: 16px;
              font-size: 18px;
              color: #555;
              line-height: 1.6;
              max-width: 600px;
              margin-left: auto;
              margin-right: auto;
            "
          >
            Report city problems like potholes, garbage, and broken
            infrastructure.
          </p>

          <div
            style="
              margin-top: 48px;
              display: flex;
              gap: 20px;
              justify-content: center;
              flex-wrap: wrap;
            "
          >
            <button
              onclick="goLogin()"
              style="
                padding: 14px 36px;
                font-size: 16px;
                background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
                box-shadow: 0 6px 20px rgba(30, 60, 114, 0.4);
              "
            >
              Login
            </button>

            <button
              onclick="goRegister()"
              style="
                padding: 14px 36px;
                font-size: 16px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
              "
            >
              Register
            </button>
          </div>
        </section>
      </main>
    </div>

    <script>
      function goLogin() {
        window.location.href = "login.html";
      }

      function goRegister() {
        window.location.href = "register.html";
      }
    </script>
  </body>
</html>
