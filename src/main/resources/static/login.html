<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Urban Issue - Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Login</h2>

      <form id="loginForm">

        <input type="password" id="password" placeholder="Password" required />

        <button type="submit">Login</button>

        <p id="message"></p>
      </form>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>
